version: '3.8'

services:
  # Service 1: The FastAPI backend API node
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid_rag_api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/home/user/app/data
    restart: unless-stopped

  # Service 2: The Streamlit frontend web dashboard
  rag-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid_rag_ui
    command: >
      streamlit run src/ui/app.py 
      --server.port=8501 
      --server.address=0.0.0.0 
      --server.enableCORS=false 
      --server.enableXsrfProtection=false 
      --server.headless=true
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BACKEND_API_URL=http://rag-api:8000
    volumes:
      - ./data:/home/user/app/data
    depends_on:
      - rag-api
    restart: unless-stopped
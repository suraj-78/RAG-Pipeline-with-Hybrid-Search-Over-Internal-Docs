version: '3.8'

services:
  # Service 1: The Core AI Processing Backend Gateway
  rag-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: production_hybrid_rag_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Service 2: The Streamlit Web Analytics Dashboard Frontend
  rag-frontend:
    image: python:3.12-slim
    container_name: production_hybrid_rag_frontend
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://rag-backend:8000
    depends_on:
      - rag-backend
    command: >
      sh -c "pip install uv &&
             uv pip install --system streamlit requests &&
             streamlit run src/ui/app.py --server.port=8501 --server.address=0.0.0.0"
    restart: unless-stopped